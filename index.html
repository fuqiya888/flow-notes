<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flow">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#2E7D5E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@300;400;500&family=Lato:wght@300;400;700&family=Merriweather:wght@300;400&family=Source+Sans+3:wght@300;400;500&family=Nunito:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px">
    <button class="header-btn" id="toggleSidebar" title="折叠/展开列表">☰</button>
    <span class="logo">Flow</span>
  </div>
  <div class="header-right">
    <button class="gear-btn" id="gearBtn" title="设置">⚙</button>
  </div>
</header>

<!-- 设置面板（从右侧滑入） -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-head">
      <span class="settings-head-title" data-i18n="settings">设置</span>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>

    <!-- 外观 -->
    <div class="settings-section">
      <div class="settings-label" data-i18n="appearance">外观</div>
      <div class="fp-label" data-i18n="fontFamily">西文字体</div>
      <div class="font-panel-row">
        <span class="fp-chip active" data-font="system" data-i18n="fontSystem">系统</span>
        <span class="fp-chip" data-font="inter">Inter</span>
        <span class="fp-chip" data-font="poppins">Poppins</span>
        <span class="fp-chip" data-font="lato">Lato</span>
        <span class="fp-chip" data-font="merriweather">Merriweather</span>
        <span class="fp-chip" data-font="sourcesans">Source Sans</span>
        <span class="fp-chip" data-font="nunito">Nunito</span>
        <span class="fp-chip" data-font="playfair">Playfair</span>
      </div>
      <div class="fp-label" data-i18n="fontChinese">中文字体</div>
      <div class="font-panel-row">
        <span class="fp-chip active" data-cjk="system" data-i18n="fontCjkSystem">系统</span>
        <span class="fp-chip" data-cjk="notoSans">思源黑体</span>
        <span class="fp-chip" data-cjk="notoSerif">思源宋体</span>
        <span class="fp-chip" data-cjk="heiti">黑体</span>
        <span class="fp-chip" data-cjk="songti">宋体</span>
        <span class="fp-chip" data-cjk="kaiti">楷体</span>
        <span class="fp-chip" data-cjk="fangsong">仿宋</span>
      </div>
      <div class="fp-label" data-i18n="fontSize">字号</div>
      <div class="fp-size-row">
        <span class="fp-size" data-size="14">小</span>
        <span class="fp-size active" data-size="16">默认</span>
        <span class="fp-size" data-size="18">大</span>
      </div>
      <div class="settings-row">
        <label data-i18n="theme">主题</label>
        <div class="theme-switcher">
          <div class="theme-dot t-green active" id="themeDotGreen"></div>
          <div class="theme-dot t-warm" id="themeDotWarm"></div>
          <div class="theme-dot t-night" id="themeDotNight"></div>
        </div>
      </div>
      <div class="settings-row">
        <label data-i18n="langLabel">语言</label>
        <button class="settings-btn" id="langBtn">EN</button>
      </div>
    </div>

    <!-- 云同步（支持任意 WebDAV 服务） -->
    <div class="settings-section">
      <div class="settings-label" data-i18n="syncTitle">☁ 云同步</div>
      <div class="sync-inputs">
        <input class="sync-input" id="syncServer" placeholder="WebDAV 服务器地址" autocomplete="off" data-i18n-ph="syncServer">
        <input class="sync-input" id="syncUser" placeholder="账号（邮箱）" autocomplete="off" data-i18n-ph="syncUser">
        <div class="password-wrapper">
          <input class="sync-input" id="syncPass" type="password" placeholder="应用密码" autocomplete="current-password" data-i18n-ph="syncPass">
          <button class="password-toggle" id="passwordToggle" type="button" title="显示密码" data-visible="false"></button>
        </div>
      </div>
      <div class="settings-btns">
        <button class="settings-btn" id="btnUpload" data-i18n="syncUpload">↑ 上传到云端</button>
        <button class="settings-btn" id="btnDownload" data-i18n="syncDownload">↓ 从云端下载</button>
      </div>
      <div id="syncStatus" class="sync-status"></div>
    </div>

    <!-- 导出 / 导入 -->
    <div class="settings-section">
      <div class="settings-label" data-i18n="exportMenu">导出</div>
      <button class="settings-btn" id="exportJsonBtn">JSON</button>
      <button class="settings-btn" id="exportTxtBtn">TXT</button>
      <div class="settings-inner-divider"></div>
      <div class="settings-label" data-i18n="importData">导入</div>
      <button class="settings-btn" id="importBtn">📂 JSON / TXT</button>
      <input type="file" id="importFile" accept=".json,.txt" style="display:none">
    </div>

    <!-- 回收站 -->
    <div class="settings-section">
      <div class="settings-label" data-i18n="trashTitle">回收站</div>
      <button class="settings-btn" id="settingsTrashBtn">🗑 <span data-i18n="langOpen">打开</span></button>
    </div>
  </div>
</div>

<main>
  <!-- 左侧：笔记列表 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="搜索笔记…" data-i18n-ph="search" autocomplete="off">
      </div>
      <button class="sidebar-toggle-read" id="toggleReadingMode" title="阅读模式">📖</button>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- 右侧：主书写区 -->
  <div class="editor-pane" id="editorPane">
    <div class="editor-textarea-wrap">
      <textarea id="editor" placeholder="在这里写下你的想法…" data-i18n-ph="placeholder"></textarea>
      <button class="btn-mic" id="btnMic" title="语音输入">🎤</button>
    </div>
    <div class="editor-footer">
      <div class="save-status" id="saveStatus" title="">
        <span class="save-status-icon saved" id="saveIcon">✓</span>
        <span class="save-status-text" id="saveText" data-i18n="saved">已保存</span>
      </div>
      <div class="btn-row">
        <button class="btn-save" id="btnSave" data-i18n="save">保存</button>
        <button class="btn-action" id="btnClear" data-i18n="clear">清空</button>
        <button class="btn-action" id="btnDelete" data-i18n="delete" disabled>删除</button>
      </div>
    </div>
  </div>
</main>

<!-- 手机底部导航 -->
<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-btn" id="mnavNotes">
    <span class="mnav-icon">📋</span> <span data-i18n="mnavNotes">历史</span>
  </button>
  <button class="mobile-nav-btn" id="mnavExport">
    <span class="mnav-icon">📤</span> <span data-i18n="mnavExport">导出</span>
  </button>
  <button class="mnav-mic" id="mnavMic" title="语音输入">
    <span>🎤</span>
  </button>
  <button class="mobile-nav-btn" id="mnavSync">
    <span class="mnav-icon">☁️</span> <span data-i18n="mnavSync">同步</span>
  </button>
  <button class="mobile-nav-btn" id="mnavTrash">
    <span class="mnav-icon">🗑️</span> <span data-i18n="mnavTrash">回收站</span>
  </button>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- 确认弹窗 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" id="confirmCancel" data-i18n="cancel">取消</button>
      <button class="confirm-btn confirm-btn-ok" id="confirmOk" data-i18n="confirm">确认</button>
    </div>
  </div>
</div>

<!-- 回收站弹窗 -->
<div class="trash-overlay" id="trashOverlay">
  <div class="trash-dialog">
    <div class="trash-header">
      <span class="trash-title" data-i18n="trashTitle">回收站</span>
      <button class="trash-clear-btn" id="trashClearBtn" data-i18n="trashClear">清空回收站</button>
    </div>
    <div class="trash-list" id="trashList"></div>
    <div class="trash-close-row">
      <button class="trash-close-btn" id="trashCloseBtn" data-i18n="cancel">关闭</button>
    </div>
  </div>
</div>

<!-- 冲突解决弹窗 -->
<div class="conflict-overlay" id="conflictOverlay">
  <div class="conflict-dialog">
    <div class="conflict-title" id="conflictTitle">发现版本冲突</div>
    <div class="conflict-msg" id="conflictMsg">检测到两处修改，请选择保留哪个版本</div>
    <div class="conflict-versions">
      <div class="conflict-version conflict-version-local">
        <div class="conflict-version-header">
          <span data-i18n="conflictKeepLocal">📱 保留本地版本</span>
          <span class="conflict-time" id="conflictLocalTime"></span>
        </div>
        <div class="conflict-preview" id="conflictLocalPreview"></div>
        <button class="conflict-btn" id="conflictLocalBtn" data-i18n="conflictKeepLocal">保留本地</button>
      </div>
      <div class="conflict-version conflict-version-cloud">
        <div class="conflict-version-header">
          <span data-i18n="conflictKeepCloud">☁️ 保留云端版本</span>
          <span class="conflict-time" id="conflictCloudTime"></span>
        </div>
        <div class="conflict-preview" id="conflictCloudPreview"></div>
        <button class="conflict-btn conflict-btn-primary" id="conflictCloudBtn" data-i18n="conflictKeepCloud">保留云端</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
