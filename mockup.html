<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心流 · Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@300;400;500&family=Lato:wght@300;400;700&family=Merriweather:wght@300;400&family=Source+Sans+3:wght@300;400;500&family=Nunito:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ═══ 完全复制你原版的 CSS ═══ */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-sidebar: #F2F6F5;
    --bg-main: #FDFDFD;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F7FAF9;
    --accent: #5B7F7B;
    --text: #2D3B39;
    --text-muted: #9AA8A6;
    --border: rgba(91,127,123,0.10);
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-hover: 0 3px 10px rgba(0,0,0,0.07);
    --font-size: 16px;
    --font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --sidebar-width: 33.33%;
  }

  body {
    font-family: var(--font-family); font-size: var(--font-size);
    height: 100vh; display: flex; flex-direction: column;
    background: var(--bg-main); color: var(--text);
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px; min-height: 52px;
    background: var(--bg-main); border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 20px; color: var(--accent); letter-spacing: 2px;
    user-select: none;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .header-btn {
    font-size: 12px; color: var(--text-muted); cursor: pointer;
    padding: 3px 8px; border-radius: 6px; border: 1px solid transparent;
    transition: all 0.2s; user-select: none; background: none;
  }
  .header-btn:hover { border-color: var(--border); color: var(--text); }

  /* ── Main Layout ── */
  main { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar (原版) */
  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background: var(--bg-sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.3s, min-width 0.3s;
  }
  .sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }
  .sidebar-header { padding: 14px 16px 10px; }
  .search-input {
    width: 100%; padding: 8px 12px 8px 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-card);
    font-size: 13px; color: var(--text); outline: none;
    font-family: var(--font-family); transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--text-muted); pointer-events: none;
  }

  .notes-list {
    flex: 1; overflow-y: auto; padding: 6px 10px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .empty-hint {
    color: var(--text-muted); font-size: 13px; text-align: center;
    margin-top: 80px; line-height: 1.8;
  }
  .note-card {
    background: var(--bg-card); border-radius: 8px; padding: 12px 14px;
    box-shadow: var(--shadow); user-select: text; cursor: text;
    transition: box-shadow 0.2s, background 0.15s;
    position: relative;
  }
  .note-card:hover { box-shadow: var(--shadow-hover); background: var(--bg-card-hover); }
  .note-card:hover .card-del { opacity: 1; }
  .card-del {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-muted); opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .card-del:hover { color: #E57373; background: rgba(229,115,115,0.10); }
  .note-card-preview {
    font-size: 14px; color: var(--text); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 20px;
    transition: all 0.2s;
  }
  .note-card.expanded .note-card-preview {
    white-space: pre-wrap; word-break: break-word;
    max-height: 60vh; overflow-y: auto;
  }
  .note-card-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* Editor */
  .editor-pane {
    flex: 1; display: flex; flex-direction: column; padding: 24px 32px;
    min-width: 0;
  }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    resize: none; font-size: var(--font-size); line-height: 1.8;
    color: var(--text); font-family: var(--font-family);
  }
  textarea::placeholder { color: var(--text-muted); }

  .editor-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border); margin-top: 8px;
  }
  .save-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted); cursor: pointer;
    user-select: none; padding: 2px 0;
  }
  .save-status-icon {
    width: 14px; height: 14px; display: inline-flex;
    align-items: center; justify-content: center; font-size: 12px;
  }
  .save-status-icon.saved  { color: #4CAF50; }
  .save-status-text { font-size: 11px; }

  .btn-row { display: flex; gap: 8px; align-items: center; }
  .btn-action {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-muted); font-size: 12px;
    cursor: pointer; transition: all 0.2s; font-family: var(--font-family);
  }
  .btn-action:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-action:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-save {
    padding: 6px 18px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; font-family: var(--font-family);
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.97); }

  /* ── 新增：设置面板（右侧滑入） ── */
  .gear-btn {
    font-size: 20px; color: var(--text-muted); cursor: pointer;
    padding: 4px 8px; border-radius: 6px; border: 1px solid transparent;
    transition: all 0.2s; background: none; display: flex; align-items: center;
  }
  .gear-btn:hover { border-color: var(--border); color: var(--text); }

  .settings-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.15);
    align-items: stretch; justify-content: flex-end;
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    width: 360px; max-width: 90vw;
    background: var(--bg-card);
    padding: 24px 20px;
    box-shadow: -4px 0 24px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .settings-section {}
  .settings-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
  }
  .settings-row label { font-size: 13px; color: var(--text); }

  /* 字体芯片（原版风格） */
  .fp-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .fp-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .fp-chip {
    padding: 3px 10px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; color: var(--text); background: transparent;
  }
  .fp-chip.active, .fp-chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .fp-size-row { display: flex; gap: 6px; }
  .fp-size {
    flex: 1; text-align: center; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; border: 1px solid var(--border); cursor: pointer;
    color: var(--text); transition: all 0.15s; background: transparent;
  }
  .fp-size.active, .fp-size:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* 主题圆点 */
  .theme-switcher { display: flex; gap: 8px; align-items: center; }
  .theme-dot {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid rgba(0,0,0,0.15); transition: border-color 0.2s, transform 0.2s;
  }
  .theme-dot:hover, .theme-dot.active {
    border-color: var(--text); transform: scale(1.15);
  }
  .theme-dot.t-green { background: #2E7D5E; }
  .theme-dot.t-warm  { background: #C0622F; }
  .theme-dot.t-night { background: #555555; }

  /* 同步输入框 */
  .sync-input {
    width: 100%; padding: 5px 10px; border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.12); font-size: 12px; outline: none;
    background: transparent; color: var(--text); font-family: var(--font-family);
    margin-bottom: 6px;
  }
  .sync-status { font-size: 11px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }

  /* 设置面板内小按钮 */
  .settings-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); cursor: pointer;
    color: var(--text); background: transparent;
    transition: all 0.15s; font-family: var(--font-family);
    margin-right: 6px; margin-bottom: 6px;
  }
  .settings-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .settings-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* 关闭按钮 */
  .settings-close {
    font-size: 18px; color: var(--text-muted); cursor: pointer;
    background: none; border: none; padding: 4px;
  }
  .settings-close:hover { color: var(--text); }

  /* ── Mobile (手机原版风格) ── */
  @media (max-width: 768px) {
    :root { --sidebar-width: 100%; }

    body { flex-direction: column; }
    header { padding: 0 12px; height: 44px; min-height: 44px; }
    .logo { font-size: 17px; letter-spacing: 1px; }
    .header-right { gap: 6px; }

    /* 手机端隐藏头部按钮，走底部导航 */
    #toggleSidebar { display: none; }

    main { flex-direction: column; overflow-y: auto; }
    .editor-pane { flex: 1; padding: 16px; min-height: 40vh; }
    textarea { font-size: 15px; line-height: 1.7; }

    .sidebar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      width: 100% !important; min-width: 100% !important;
      max-height: 50vh; border-radius: 16px 16px 0 0;
      border-right: none; border-top: 1px solid var(--border);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .sidebar:not(.collapsed) { transform: translateY(0); }
    .sidebar.collapsed { transform: translateY(100%); }

    .mobile-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 0 12px; border-top: 1px solid var(--border);
      background: var(--bg-main);
    }
    .mobile-nav-btn {
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      padding: 4px 12px; border-radius: 20px; border: none;
      background: transparent;
      transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .mobile-nav-btn .mnav-icon { font-size: 18px; }
    .mobile-nav-btn:hover, .mobile-nav-btn:active { color: var(--accent); }

    .sidebar-backdrop { display: none; position: fixed; inset: 0; z-index: 140; background: rgba(0,0,0,0.3); }
    .sidebar-backdrop.open { display: block; }
    .notes-list { padding: 4px 10px 80px; }
    .note-card { padding: 10px 12px; }
    .editor-footer { flex-wrap: wrap; gap: 8px; padding-top: 10px; }
    .btn-row { gap: 6px; }
    .btn-save { padding: 8px 20px; font-size: 13px; }
    .btn-action { padding: 8px 12px; font-size: 12px; }
  }
  .mobile-nav { display: none; }
  .sidebar-backdrop { display: none; }
  @media (max-width: 768px) {
    .mobile-nav { display: flex; }
    .sidebar-backdrop { display: none; }
  }
</style>
</head>
<body>

<!-- ═══ Header：只保留 ☰ 开关 + Flow logo + ⚙ 齿轮 ═══ -->
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <button class="header-btn" id="toggleSidebar" title="折叠/展开列表">☰</button>
    <span class="logo">Flow</span>
  </div>
  <div class="header-right">
    <button class="gear-btn" title="设置" onclick="document.getElementById('settingsOverlay').classList.add('open')">⚙</button>
  </div>
</header>

<main>
  <!-- 左侧列表（原版样式不变） -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" placeholder="搜索笔记…" readonly>
      </div>
    </div>
    <div class="notes-list" id="notesList">
      <div class="note-card">
        <button class="card-del">×</button>
        <div class="note-card-preview">今天的工作总结</div>
        <div class="note-card-time">3 分钟前</div>
      </div>
      <div class="note-card">
        <button class="card-del">×</button>
        <div class="note-card-preview">周末灵感：做一个极简的本地笔记应用，数据存在坚果云</div>
        <div class="note-card-time">昨天 14:30</div>
      </div>
      <div class="note-card">
        <button class="card-del">×</button>
        <div class="note-card-preview">书架清单：《深度工作》《原子习惯》</div>
        <div class="note-card-time">5 天前</div>
      </div>
    </div>
  </div>

  <!-- 右侧编辑区（原版样式不变） -->
  <div class="editor-pane" id="editorPane">
    <textarea placeholder="在这里写下你的想法…">完成了前端重构，把 CSS 和 JS 拆分到独立文件。</textarea>
    <div class="editor-footer">
      <div class="save-status">
        <span class="save-status-icon saved">✓</span>
        <span class="save-status-text">已保存</span>
      </div>
      <div class="btn-row">
        <button class="btn-save">保存</button>
        <button class="btn-action">清空</button>
        <button class="btn-action" disabled>删除</button>
      </div>
    </div>
  </div>
</main>

<!-- 手机底部导航（原版样式不变） -->
<nav class="mobile-nav">
  <button class="mobile-nav-btn"><span class="mnav-icon">📋</span> <span>历史</span></button>
  <button class="mobile-nav-btn"><span class="mnav-icon">📤</span> <span>导出</span></button>
  <button class="mobile-nav-btn"><span class="mnav-icon">☁️</span> <span>同步</span></button>
  <button class="mobile-nav-btn"><span class="mnav-icon">🗑️</span> <span>回收站</span></button>
</nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- ═══ 设置面板（齿轮点开后从右侧滑入） ═══ -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="settings-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:16px;font-weight:500;color:var(--text);">设置</span>
      <button class="settings-close" onclick="document.getElementById('settingsOverlay').classList.remove('open')">✕</button>
    </div>

    <!-- 外观 -->
    <div class="settings-section">
      <div class="settings-section-title">外观</div>

      <div class="fp-label">西文字体</div>
      <div class="fp-row">
        <span class="fp-chip active">系统</span>
        <span class="fp-chip">Inter</span>
        <span class="fp-chip">Poppins</span>
        <span class="fp-chip">Lato</span>
        <span class="fp-chip">Merriweather</span>
        <span class="fp-chip">Source Sans</span>
        <span class="fp-chip">Nunito</span>
        <span class="fp-chip">Playfair</span>
      </div>

      <div class="fp-label">中文字体</div>
      <div class="fp-row">
        <span class="fp-chip active">系统</span>
        <span class="fp-chip">思源黑体</span>
        <span class="fp-chip">思源宋体</span>
        <span class="fp-chip">黑体</span>
        <span class="fp-chip">宋体</span>
        <span class="fp-chip">楷体</span>
        <span class="fp-chip">仿宋</span>
      </div>

      <div class="fp-label">字号</div>
      <div class="fp-size-row">
        <span class="fp-size">小</span>
        <span class="fp-size active">默认</span>
        <span class="fp-size">大</span>
      </div>

      <div class="settings-row">
        <label>主题</label>
        <div class="theme-switcher">
          <div class="theme-dot t-green active"></div>
          <div class="theme-dot t-warm"></div>
          <div class="theme-dot t-night"></div>
        </div>
      </div>

      <div class="settings-row">
        <label>语言</label>
        <button class="settings-btn">中文</button>
      </div>
    </div>

    <!-- 坚果云同步 -->
    <div class="settings-section">
      <div class="settings-section-title">☁ 坚果云同步</div>
      <input class="sync-input" placeholder="账号（邮箱）" value="92*******@qq.com" readonly>
      <input class="sync-input" placeholder="应用密码" type="password" value="••••••••" readonly>
      <div style="display:flex;gap:6px;">
        <span class="fp-chip">↑ 上传到云端</span>
        <span class="fp-chip">↓ 从云端下载</span>
      </div>
      <div class="sync-status">✓ 上次同步：3 分钟前</div>
    </div>

    <!-- 数据 -->
    <div class="settings-section">
      <div class="settings-section-title">数据</div>
      <button class="settings-btn">导出 JSON</button>
      <button class="settings-btn">导出 TXT</button>
      <button class="settings-btn">导出 Markdown</button>
      <button class="settings-btn">导入数据</button>
    </div>

    <!-- 回收站 -->
    <div class="settings-section">
      <div class="settings-section-title">回收站</div>
      <div style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:13px;">书架清单</span>
          <button class="settings-btn" style="font-size:11px;">恢复</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:13px;">日记草稿</span>
          <button class="settings-btn" style="font-size:11px;">恢复</button>
        </div>
      </div>
      <button class="settings-btn" style="color:#E57373;border-color:#E57373;">清空回收站</button>
    </div>
  </div>
</div>

</body>
</html>
